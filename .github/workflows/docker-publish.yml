name: Build and publish Docker image

on:
  push:
    branches: [main, webrtc-passthrough, aiortc-relay]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            # Rolling dev: every push to main -> :latest (+ :sha-<commit>)
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            # webrtc-passthrough branch -> :webrtc-test (experimental image)
            type=raw,value=webrtc-test,enable=${{ github.ref == 'refs/heads/webrtc-passthrough' }}
            # aiortc-relay branch -> :aiortc-test (experimental image)
            type=raw,value=aiortc-test,enable=${{ github.ref == 'refs/heads/aiortc-relay' }}
            # Releases: tag v1.2.3 -> :1.2.3, :1.2, :1, and :stable
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=stable,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
