# Mammotion bridge service — paste this into your existing Frigate compose.
#
# The bridge joins the mower's Agora WebRTC channel as a passive subscriber
# (using a patched aiortc stack that accepts H265 as opaque RTP) and serves
# the inbound packets verbatim from a small RTSP server. Frigate's bundled
# go2rtc picks them up via `rtsp://mammotion-bridge:8554/<stream>`. No ffmpeg,
# no transcoding.
#
# Drop this `mammotion-bridge` service into the same compose file as Frigate
# so they share a network — that lets the bridge reach `frigate:1984` for
# go2rtc REST registration, and lets go2rtc reach the bridge at
# `mammotion-bridge:8554` for RTSP.

services:
  mammotion-bridge:
    container_name: mammotion-bridge
    # :stable -> newest tagged release (recommended).
    # :latest -> main branch HEAD. :0.1.3 -> pinned version.
    image: ghcr.io/bleialf/mammotion-rtsp-bridge:stable
    restart: unless-stopped
    environment:
      MAMMOTION_EMAIL: "your@email.com"
      MAMMOTION_PASSWORD: "your-password"
      # Device name in the Mammotion app, or "first" to auto-pick.
      MAMMOTION_DEVICE_NAME: "first"
      # go2rtc REST API base — the bridge auto-registers the stream here.
      GO2RTC_API_URL: "http://frigate:1984"
      # Name go2rtc registers the stream under.
      MAMMOTION_STREAM_NAME: "mammotion"
      # Host go2rtc uses to dial back to the bridge.
      MAMMOTION_RTSP_HOST: "mammotion-bridge"
    # Optional: expose RTSP on the host for direct testing (ffplay/VLC).
    # ports:
    #   - "5001:8554"
